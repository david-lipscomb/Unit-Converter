<!DOCTYPE html>
<html>
    <head>
        <link href="index.css" rel="stylesheet">
    </head>
    <body>
        <div class="top-sec">
            <h2 id="title">Metric/Imperial Unit Converstion</h2>
            <input type="text" id="num-inp"></input>
            <button id="convert-btn">Convert</button>
        </div>
        <div class="bottom-sec">
            <div class="unit-cont">
                <h3>Length (Meter/Feet)</h3>
                <p id=length-sec class="p-sec">0 meters</p>
            </div>
            <div class="unit-cont">
                <h3>Volume (Liters/Gallons)</h3>
                <p id=volume-sec class="p-sec">0 liters</p>
            </div>
            <div class="unit-cont">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p id=mass-sec class="p-sec">0 kilos</p>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
